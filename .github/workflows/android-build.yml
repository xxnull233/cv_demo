name: Android Build (APK)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APKs (Split by ABI)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: v$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android keystore
        run: |
          mkdir -p "$HOME/keys"
          echo "${{ secrets.ANDROID_KEYS_BASE64 }}" | base64 -d > "$HOME/keys/keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$HOME/keys/keystore.jks" >> "$GITHUB_ENV"

      - name: Prebuild native project (Expo)
        run: npx expo prebuild --platform android --clean

      - name: Override AGP version and add ABI splits
        run: |
          # Expo SDK 53 modules require AGP >= 8.9.1; RN 0.79.6 defaults to 8.8.2
          sed -i "s/classpath('com.android.tools.build:gradle')/classpath('com.android.tools.build:gradle:8.9.1')/" android/build.gradle

          # Add ABI splits to generate per-architecture APKs (smaller download size)
          # Write node script to temp file to avoid bash quoting issues
          cat > /tmp/add-splits.js << 'NODESCRIPT'
            const fs = require('fs');
            let c = fs.readFileSync('android/app/build.gradle', 'utf8');
            const splitBlock = [
              '    splits {',
              '        abi {',
              '            enable true',
              '            reset()',
              "            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'",
              '            universalApk false',
              '        }',
              '    }',
              ''
            ].join('\n');
            c = c.replace("namespace 'com.anonymous.cv'", "namespace 'com.anonymous.cv'\n" + splitBlock);
            fs.writeFileSync('android/app/build.gradle', c);
          NODESCRIPT
          node /tmp/add-splits.js

      - name: Build signed release APKs (per-ABI)
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.EXPO_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.EXPO_KEY_PASSWORD }}

      - name: Rename APKs to custom format
        run: |
          APP_NAME="CV"
          APP_VER=$(node -p "require('./app.json').expo.version")
          DATE_TAG=$(date +%y%m%d%H%M)
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            # Extract ABI from filename: app-arm64-v8a-release.apk -> arm64-v8a
            abi=$(echo "$apk" | sed 's/^app-//;s/-release.apk$//')
            new_name="${APP_NAME}-${abi}-v${APP_VER}-${DATE_TAG}.apk"
            mv "$apk" "$new_name"
            echo "Renamed: $apk -> $new_name"
          done

      - name: Upload APK (Actions Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-apks-per-abi
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Delete existing release & tag (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.app_version.outputs.version }}"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.version }}
          name: ${{ steps.app_version.outputs.version }}
          body: |
            ## CV Mobile ${{ steps.app_version.outputs.version }}

            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}