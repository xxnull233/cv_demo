name: Build All (APK + IPA)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (empty = both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - android
          - ios

jobs:
  # -- Android --
  android:
    name: Build Android APKs
    if: inputs.platform == '' || inputs.platform == 'android'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android keystore
        run: |
          mkdir -p "$HOME/keys"
          echo "${{ secrets.ANDROID_KEYS_BASE64 }}" | base64 -d > "$HOME/keys/keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$HOME/keys/keystore.jks" >> "$GITHUB_ENV"

      - name: Prebuild native project (Expo)
        run: npx expo prebuild --platform android --clean

      - name: Override AGP version and add ABI splits
        run: |
          sed -i "s/classpath('com.android.tools.build:gradle')/classpath('com.android.tools.build:gradle:8.9.1')/" android/build.gradle
          cat > /tmp/add-splits.js << 'NODESCRIPT'
            const fs = require('fs');
            let c = fs.readFileSync('android/app/build.gradle', 'utf8');
            const splitBlock = [
              '    splits {',
              '        abi {',
              '            enable true',
              '            reset()',
              "            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'",
              '            universalApk false',
              '        }',
              '    }',
              ''
            ].join('\n');
            c = c.replace("namespace 'com.anonymous.cv'", "namespace 'com.anonymous.cv'\n" + splitBlock);
            fs.writeFileSync('android/app/build.gradle', c);
          NODESCRIPT
          node /tmp/add-splits.js

      - name: Build signed release APKs (per-ABI)
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.EXPO_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.EXPO_KEY_PASSWORD }}

      - name: Rename APKs to custom format
        run: |
          APP_NAME=CV
          APP_VER=$(node -p "require('./app.json').expo.version")
          DATE_TAG=$(date +%y%m%d%H%M)
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            abi=$(echo "$apk" | sed 's/^app-//;s/-release.apk$//')
            new_name="${APP_NAME}-${abi}-v${APP_VER}-${DATE_TAG}.apk"
            mv "$apk" "$new_name"
            echo "Renamed: $apk -> $new_name"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-apks-per-abi
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # -- iOS --
  ios:
    name: Build iOS IPA (unsigned)
    if: inputs.platform == '' || inputs.platform == 'ios'
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native project (Expo)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build unsigned release .app
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Detected workspace: $WORKSPACE"
          echo "Detected scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            build \
            CODE_SIGNING_ALLOWED=NO
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r "ios/build/Build/Products/Release-iphoneos/${SCHEME}.app" Payload/
          zip -r unsigned.ipa Payload/
          rm -rf Payload

      - name: Rename IPA to custom format
        run: |
          APP_NAME=CV
          APP_VER=$(node -p "require('./app.json').expo.version")
          DATE_TAG=$(date +%y%m%d%H%M)
          new_name="${APP_NAME}-ios-v${APP_VER}-${DATE_TAG}.ipa"
          mv unsigned.ipa "$new_name"
          echo "Renamed: unsigned.ipa -> $new_name"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-unsigned
          path: ./*.ipa
          if-no-files-found: error

  # -- Release (runs after both) --
  release:
    name: Create unified Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: v$VERSION"

      - name: Download Android APKs
        if: needs.android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-apks-per-abi
          path: dist/

      - name: Download iOS IPA
        if: needs.ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-ipa-unsigned
          path: dist/

      - name: Delete existing release & tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.app_version.outputs.version }}" --cleanup-tag --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.version }}
          name: ${{ steps.app_version.outputs.version }}
          body: |
            ## CV Mobile ${{ steps.app_version.outputs.version }}

            Commit: ${{ github.sha }}
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}