name: Mobile Build (APK)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Universal)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: v$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android keystore
        run: |
          mkdir -p "$HOME/keys"
          echo "${{ secrets.ANDROID_KEYS_BASE64 }}" | base64 -d > "$HOME/keys/keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$HOME/keys/keystore.jks" >> "$GITHUB_ENV"

      - name: Prebuild native project (Expo)
        run: npx expo prebuild --platform android --clean

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.EXPO_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.EXPO_KEY_PASSWORD }}

      - name: Upload APK (Actions Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Delete existing release & tag (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.app_version.outputs.version }}"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.version }}
          name: ${{ steps.app_version.outputs.version }}
          body: |
            ## CV Mobile ${{ steps.app_version.outputs.version }}

            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}