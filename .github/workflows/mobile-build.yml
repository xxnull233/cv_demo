name: Mobile Build (APK)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      release_tag:
        description: '发布版本号（留空仅上传 Artifact，填写如 v1.0.0 则自动创建 Release）'
        required: false
        default: ''

jobs:
  build:
    name: Build Android APK (Local)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          expo-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Setup Android keystore
        run: |
          mkdir -p $HOME/keys
          echo "${{ secrets.ANDROID_KEYS_BASE64 }}" | base64 -d > $HOME/keys/keystore.jks

      - name: EAS local Android build
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --local --clear-cache --non-interactive
        env:
          EXPO_ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYS_BASE64 }}
          EXPO_KEYSTORE_PASSWORD: ${{ secrets.EXPO_KEYSTORE_PASSWORD }}
          EXPO_KEY_PASSWORD: ${{ secrets.EXPO_KEY_PASSWORD }}

      - name: Upload APK (Actions Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build-*.apk

      - name: Create GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          body: |
            ## CV Mobile ${{ github.event.inputs.release_tag }}

            Profile: `${{ github.event.inputs.profile }}`
            Commit: ${{ github.sha }}
          files: build-*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
